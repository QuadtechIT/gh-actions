name: Publish to SharePoint

on:
  workflow_call:
    inputs:
      site_hostname:
        required: true
        type: string
      site_path:
        required: true
        type: string
      library:
        required: false
        type: string
        default: "Documents"
      source_dir:
        required: false
        type: string
        default: "scripts"
      target_root:
        required: false
        type: string
        default: ""
      dry_run:
        required: false
        type: boolean
        default: false
    secrets:
      SP_PUBLISHER_CERT:
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # Caller repo -> workspace root. No `path:` here.
      - name: Checkout script repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history + tags for the diff

      # Central repo -> .ci/ subfolder.
      - name: Checkout CI tooling
        uses: actions/checkout@v4
        with:
          repository: quadtechit/gh-actions
          ref: v1
          path: .ci
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --disable-pip-version-check msal requests cryptography

      - name: Resolve changed files
        id: diff
        run: |
          set -euo pipefail
          CURRENT="${GITHUB_REF_NAME}"
          PREV=$(git tag --sort=-creatordate | grep -v "^${CURRENT}$" | head -n1 || true)
          echo "current=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "previous=${PREV}"  >> "$GITHUB_OUTPUT"

          if [ -z "$PREV" ]; then
            echo "No previous tag — treating all tracked files as added."
            git ls-files -- "${{ inputs.source_dir }}" | sed 's/^/A\t/' > /tmp/changes.tsv
          else
            echo "Diffing ${PREV}..${CURRENT}"
            git diff --name-status --find-renames "${PREV}" "${CURRENT}" \
              -- "${{ inputs.source_dir }}" > /tmp/changes.tsv
          fi

          echo "--- changes ---"
          cat /tmp/changes.tsv
          echo "---------------"

      - name: Sync to SharePoint
        env:
          AZURE_TENANT_ID:   ${{ vars.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:   ${{ vars.AZURE_CLIENT_ID }}
          SP_PUBLISHER_CERT: ${{ secrets.SP_PUBLISHER_CERT }}
          SP_PUBLISHER_CERT_PASSWORD: ${{ secrets.SP_PUBLISHER_CERT_PASSWORD }}
          SITE_HOSTNAME:     ${{ inputs.site_hostname }}
          SITE_PATH:         ${{ inputs.site_path }}
          LIBRARY:           ${{ inputs.library }}
          SOURCE_DIR:        ${{ inputs.source_dir }}
          TARGET_ROOT:       ${{ inputs.target_root != '' && inputs.target_root || github.event.repository.name }}
          RELEASE_TAG:       ${{ steps.diff.outputs.current }}
          COMMIT_SHA:        ${{ github.sha }}
          DRY_RUN:           ${{ inputs.dry_run }}
        run: python .ci/scripts/sp_sync.py /tmp/changes.tsv
